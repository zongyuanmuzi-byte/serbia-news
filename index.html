<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>塞尔维亚每日新闻</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <header class="wrap">
    <div class="title">
      <h1>🇷🇸 塞尔维亚每日新闻</h1>
      <p id="meta">加载中…</p>
    </div>

    <div class="controls">
      <input id="q" placeholder="搜索标题/摘要/来源…" />
      <button id="refresh">刷新</button>
      <a class="btn" href="./news.json" target="_blank" rel="noreferrer">查看 news.json</a>
    </div>
  </header>

  <main class="wrap">
    <div id="stats" class="stats"></div>
    <div id="list" class="list"></div>
    <div id="empty" class="empty hidden">没有匹配的新闻</div>
  </main>

  <footer class="wrap footer">
    <span>自动更新：n8n → GitHub → Pages</span>
  </footer>

  <script src="./app.js"></script>
</body>
</html>
