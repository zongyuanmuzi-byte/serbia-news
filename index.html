<!doctype html>
<html lang="zh">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>塞尔维亚每日新闻</title>
  <style>
    body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;max-width:920px;margin:40px auto;padding:0 16px;line-height:1.6}
    h1{margin:0 0 6px}
    .meta{color:#666;margin-bottom:24px}
    .card{border:1px solid #e5e5e5;border-radius:14px;padding:16px 18px;margin:12px 0}
    .src{color:#666;font-size:13px;margin-top:8px}
    a{color:inherit}
    .tag{display:inline-block;font-size:12px;border:1px solid #ddd;border-radius:999px;padding:2px 10px;margin-right:8px;color:#444}
  </style>
</head>
<body>
  <h1>塞尔维亚每日新闻</h1>
  <div class="meta" id="meta">加载中…</div>
  <div id="list"></div>

  <script>
    async function main(){
      const res = await fetch('./news.json?_=' + Date.now());
      const data = await res.json();

      document.getElementById('meta').textContent =
        `更新时间：${data.updated_at}（共 ${data.items.length} 条）`;

      const list = document.getElementById('list');
      list.innerHTML = '';

      for(const it of data.items){
        const div = document.createElement('div');
        div.className = 'card';
        div.innerHTML = `
          <div>
            ${it.category ? `<span class="tag">${it.category}</span>` : ``}
            <a href="${it.url}" target="_blank" rel="noopener noreferrer"><b>${it.title}</b></a>
          </div>
          ${it.summary ? `<div style="margin-top:8px">${it.summary}</div>` : ``}
          <div class="src">来源：${it.source || '—'} · ${it.published_at || ''}</div>
        `;
        list.appendChild(div);
      }
    }
    main().catch(err=>{
      document.getElementById('meta').textContent = '加载失败：' + err;
    });
  </script>
</body>
</html>
